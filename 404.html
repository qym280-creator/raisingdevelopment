<!DOCTYPE html>
<html lang="en" data-locale="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found · Raising Development</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
<style>
.nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--navy);color:#fff;padding:40px}
.nf .code{font-family:var(--serif);font-size:clamp(80px,16vw,180px);font-weight:300;color:var(--gold);line-height:1}
.nf h1{font-family:var(--serif);font-weight:300;font-size:clamp(26px,4vw,40px);margin:10px 0 26px}
.nf p{color:var(--muted-light);margin-bottom:34px}
</style>
</head>
<body>
<div class="nf">
  <div class="code">404</div>
  <h1><span data-lang="en">Page Not Found</span><span data-lang="zh-Hant">頁面不存在</span><span data-lang="zh-Hans">页面不存在</span></h1>
  <p><span data-lang="en">The page you are looking for could not be found.</span><span data-lang="zh-Hant">您所尋找的頁面不存在或已移動。</span><span data-lang="zh-Hans">您所寻找的页面不存在或已移动。</span></p>
  <a class="btn btn--solid" href="/"><span data-lang="en">Return Home</span><span data-lang="zh-Hant">返回首頁</span><span data-lang="zh-Hans">返回首页</span></a>
</div>
<script src="/assets/js/main.js"></script>
</body>
</html>
