<!DOCTYPE html>
<html lang="en" data-locale="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found · Raising Development</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   Raising Development Limited — Brand Stylesheet
   Self-owned static rebuild. No external platform dependency.
   Palette  : navy #0F1B2A · royal #1F3864 · brand #1B2F6E · gold #B08D57
              ivory #F5F1EA · white #FFFFFF
   Type     : Cormorant Garamond / Noto Serif SC (display) · Inter / Noto Sans SC (body)
   ========================================================================= */

:root{
  --navy:#0D2B6B;
  --royal:#0D2B6B;
  --brand:#0D2B6B;
  --gold:#B08D57;
  --gold-soft:#c9a878;
  --ivory:#FFFFFF;
  --white:#FFFFFF;
  --ink:#13233f;
  --muted:#5A6472;
  --muted-light:rgba(255,255,255,.62);
  --line:rgba(15,27,42,.12);
  --line-light:rgba(255,255,255,.16);
  --serif:"Fraunces","Noto Serif SC",Georgia,serif;
  --sans:"Inter","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --maxw:1280px;
  --pad:clamp(20px,5vw,64px);
  --ease:cubic-bezier(.22,.61,.36,1);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--white);
  line-height:1.6;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
img,svg{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* ---- Language visibility (trilingual) -------------------------------- */
[data-lang]{display:none}
html[data-locale="en"]      [data-lang="en"],
html[data-locale="zh-Hant"] [data-lang="zh-Hant"],
html[data-locale="zh-Hans"] [data-lang="zh-Hans"]{display:inline}
html:not([data-locale]) [data-lang="en"]{display:inline}
/* block-level translated wrappers keep block flow */
p[data-lang],li[data-lang]{display:none}
html[data-locale="en"]      p[data-lang="en"],
html[data-locale="zh-Hant"] p[data-lang="zh-Hant"],
html[data-locale="zh-Hans"] p[data-lang="zh-Hans"]{display:block}

html[data-locale="zh-Hans"] .serif{font-family:"Noto Serif SC","Fraunces",serif;font-weight:400}
html[data-locale="zh-Hant"] .serif{font-family:"Noto Serif TC","Noto Serif SC","Fraunces",serif;font-weight:400}
html[data-locale="zh-Hans"] body{font-family:"Inter","Noto Sans SC",sans-serif}
html[data-locale="zh-Hant"] body{font-family:"Inter","Noto Sans TC","Noto Sans SC",sans-serif}

/* ---- Layout helpers -------------------------------------------------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.section{padding:clamp(72px,11vw,140px) 0}
.section--navy{background:var(--navy);color:var(--white)}
.section--ivory{background:var(--ivory);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.section--white{background:var(--white)}
.eyebrow{
  font-family:var(--sans);
  font-size:12px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);margin-bottom:26px;display:inline-block;
}
.serif{font-family:var(--serif);font-weight:300;line-height:1.08;letter-spacing:-.01em}
h1.serif{font-weight:300}
.h-xl{font-size:clamp(40px,7vw,82px)}
.h-lg{font-size:clamp(32px,5vw,56px)}
.h-md{font-size:clamp(26px,3.4vw,40px)}
.lead{font-size:clamp(17px,1.5vw,20px);color:var(--muted);max-width:62ch;line-height:1.75}
.section--navy .lead{color:var(--muted-light)}
.muted{color:var(--muted)}

/* ---- Buttons --------------------------------------------------------- */
.btn{
  display:inline-flex;align-items:center;gap:.6em;
  font-family:var(--sans);font-size:12.5px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  padding:18px 34px;border:1px solid transparent;cursor:pointer;
  transition:all .35s var(--ease);white-space:nowrap;
}
.btn--solid{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.btn--solid:hover{background:var(--gold-soft);border-color:var(--gold-soft)}
.btn--ghost{background:transparent;color:inherit;border-color:currentColor;opacity:.85}
.btn--ghost:hover{opacity:1;background:rgba(255,255,255,.06)}
.section--ivory .btn--ghost,.section--white .btn--ghost{border-color:var(--line)}
.section--ivory .btn--ghost:hover,.section--white .btn--ghost:hover{background:rgba(15,27,42,.04)}
.link-arrow{
  font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;gap:.5em;
  transition:gap .3s var(--ease);
}
.link-arrow:hover{gap:.9em}

/* ---- Header / Nav ---------------------------------------------------- */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  transition:background .4s var(--ease),box-shadow .4s var(--ease);
  background:transparent;
}
.site-header.scrolled{background:rgba(15,27,42,.96);box-shadow:0 1px 0 rgba(255,255,255,.06)}
.nav{display:flex;align-items:center;justify-content:space-between;height:84px;color:#fff}
.brand{display:flex;align-items:center;gap:14px;font-weight:700;letter-spacing:.16em;font-size:15px;text-transform:uppercase}
.brand .logo,.brand svg.logo{width:32px;height:32px;min-width:32px;flex:none;display:block;color:inherit}
.brand .logo svg{width:100%;height:100%;display:block}
.nav-links{display:flex;align-items:center;gap:38px}
.nav-links a{
  font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.72);transition:color .25s;position:relative;padding:6px 0;
}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-links a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--gold)}
.lang{display:flex;align-items:center;gap:10px;margin-left:8px}
.lang button{
  background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);
  font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.05em;padding:2px;transition:color .25s;
}
.lang button:hover{color:rgba(255,255,255,.85)}
.lang button.active{color:var(--gold)}
.lang .sep{color:rgba(255,255,255,.25)}
.burger{display:none;background:none;border:none;cursor:pointer;width:30px;height:22px;position:relative}
.burger span{position:absolute;left:0;right:0;height:2px;background:#fff;transition:.3s var(--ease)}
.burger span:nth-child(1){top:0}.burger span:nth-child(2){top:10px}.burger span:nth-child(3){top:20px}

/* mobile drawer */
.drawer{
  position:fixed;inset:0;z-index:99;background:var(--navy);
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:30px;
  opacity:0;visibility:hidden;transition:.4s var(--ease);
}
.drawer.open{opacity:1;visibility:visible}
.drawer a{color:#fff;font-family:var(--serif);font-size:30px;font-weight:300}
.drawer .lang{display:flex;margin-top:24px}
.drawer .lang button{color:rgba(255,255,255,.6);font-size:16px}
.drawer .lang button.active{color:var(--gold)}
.drawer-close{position:absolute;top:30px;right:var(--pad);background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}

/* ---- Hero ------------------------------------------------------------ */
.hero{
  position:relative;min-height:100vh;display:flex;align-items:center;
  background:var(--royal);color:#fff;overflow:hidden;
  padding:104px 0 56px;
}
.hero::before{
  content:"";position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:96px 96px;
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 30% 50%,#000 30%,transparent 80%);
  mask-image:radial-gradient(ellipse 80% 70% at 30% 50%,#000 30%,transparent 80%);
}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,27,42,.25),rgba(31,56,100,0) 40%,rgba(15,27,42,.55))}
.hero .wrap{position:relative;z-index:2;width:100%}
.hero h1{font-size:clamp(40px,6.2vw,88px);line-height:1.06;margin-bottom:.45em;max-width:19ch}
.hero .sub{font-family:var(--serif);font-weight:300;font-size:clamp(19px,2.5vw,31px);color:rgba(255,255,255,.7);margin-bottom:2em;letter-spacing:.01em}
html[data-locale="zh-Hant"] .hero .sub,html[data-locale="zh-Hans"] .hero .sub{font-family:"Noto Serif SC",var(--serif)}
.hero-actions{display:flex;gap:18px;flex-wrap:wrap}
.scroll-cue{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.25em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:10px}
.scroll-cue::after{content:"";width:1px;height:46px;background:linear-gradient(rgba(255,255,255,.5),transparent);animation:cue 2s var(--ease) infinite}
@keyframes cue{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}50.1%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* ---- Section heading block ------------------------------------------ */
.sec-head{max-width:760px;margin-bottom:clamp(48px,6vw,76px)}
.sec-head.center{margin-left:auto;margin-right:auto;text-align:center}
.sec-head .lead{margin-top:24px}

/* ---- Cards / grids --------------------------------------------------- */
.grid{display:grid;gap:28px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{
  background:var(--white);padding:clamp(28px,3vw,42px);
  border:1px solid var(--line);transition:transform .4s var(--ease),box-shadow .4s var(--ease);
}
.section--ivory .card{box-shadow:0 1px 2px rgba(15,27,42,.04)}
.card:hover{transform:translateY(-4px);box-shadow:0 24px 50px -28px rgba(15,27,42,.28)}
.card h3{font-family:var(--serif);font-weight:400;font-size:clamp(21px,2vw,27px);margin-bottom:16px;color:var(--navy);line-height:1.2}
.card p{color:var(--muted);font-size:15.5px;line-height:1.72}
.card--dark{background:rgba(255,255,255,.03);border-color:var(--line-light)}
.card--dark h3{color:#fff}
.card--dark p{color:var(--muted-light)}

/* ---- Stat band ------------------------------------------------------- */
.stats{display:grid;grid-template-columns:repeat(3,1fr)}
.stat{padding:clamp(30px,4vw,56px) clamp(20px,3vw,44px);position:relative}
.stat + .stat::before{content:"";position:absolute;left:0;top:18%;bottom:18%;width:1px;background:var(--line)}
.section--navy .stat + .stat::before{background:var(--line-light)}
.stat .num{font-family:var(--serif);font-weight:400;font-size:clamp(40px,5.5vw,72px);color:var(--royal);line-height:1;letter-spacing:-.02em}
.section--navy .stat .num{color:#fff}
.stat .label{margin-top:18px;font-size:14.5px;color:var(--muted);line-height:1.4}
.section--navy .stat .label{color:var(--muted-light)}
.stat .src{margin-top:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:rgba(15,27,42,.4)}
.section--navy .stat .src{color:rgba(255,255,255,.4)}

/* ---- Quote ----------------------------------------------------------- */
.pullquote{font-family:var(--serif);font-weight:300;font-style:italic;font-size:clamp(24px,3.4vw,40px);line-height:1.3;color:#fff;max-width:20ch;margin-top:60px;border-left:2px solid var(--gold);padding-left:32px}
html[data-locale="zh-Hant"] .pullquote,html[data-locale="zh-Hans"] .pullquote{font-family:"Noto Serif SC",var(--serif);font-style:normal}

/* ---- Differentiation pillars ---------------------------------------- */
.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-light);border:1px solid var(--line-light)}
.pillar{background:rgba(255,255,255,.05);padding:clamp(32px,3.5vw,48px)}
.pillar .idx{font-family:var(--serif);font-size:34px;color:var(--gold);font-weight:400;margin-bottom:22px;display:block}
.pillar h3{font-family:var(--serif);font-weight:400;font-size:23px;color:#fff;margin-bottom:14px;line-height:1.25}
.pillar p{color:var(--muted-light);font-size:15px;line-height:1.7}

/* ---- Stage / flywheel timeline -------------------------------------- */
.stages{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:20px}
.stage{padding:38px 0 0;border-top:2px solid var(--line)}
.stage--current{border-top-color:var(--gold)}
.stage .tag{font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.stage--current .tag{color:var(--gold)}
.stage h3{font-family:var(--serif);font-weight:400;font-size:clamp(22px,2.2vw,29px);color:var(--navy);margin:18px 0 14px}
.stage p{color:var(--muted);font-size:15px;line-height:1.72}

/* ---- Sector list ----------------------------------------------------- */
.sectors{border-top:1px solid var(--line)}
.sector{display:grid;grid-template-columns:.5fr 1fr;gap:30px;padding:34px 0;border-bottom:1px solid var(--line);align-items:baseline;transition:padding-left .4s var(--ease)}
.sector:hover{padding-left:14px}
.sector h3{font-family:var(--serif);font-weight:400;font-size:clamp(22px,2.4vw,30px);color:var(--navy)}
.sector p{color:var(--muted);font-size:15.5px;line-height:1.7}
@media(max-width:720px){.sector{grid-template-columns:1fr;gap:10px}}

/* ---- CTA band -------------------------------------------------------- */
.cta{text-align:center}
.cta .h-lg{margin-bottom:24px}
.cta-actions{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:42px}

/* ---- About: founders ------------------------------------------------- */
.founder{display:grid;grid-template-columns:.8fr 1.2fr;gap:clamp(28px,5vw,72px);padding:clamp(40px,5vw,68px) 0;border-bottom:1px solid var(--line)}
.founder:last-child{border-bottom:none}
.founder .who .name{font-family:var(--serif);font-weight:400;font-size:clamp(30px,3.6vw,46px);color:var(--navy);line-height:1.05}
.founder .who .name small{display:block;font-family:var(--sans);font-size:14px;letter-spacing:.04em;color:var(--muted);margin-top:8px;font-weight:400}
.founder .who .role{margin-top:18px;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.founder .bio p{color:var(--muted);font-size:16px;line-height:1.8;margin-bottom:18px}
.founder .bio p:last-child{margin-bottom:0}
@media(max-width:760px){.founder{grid-template-columns:1fr;gap:24px}}

/* ---- Capability triangle -------------------------------------------- */
.triangle-wrap{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,5vw,72px);align-items:center}
.tri-visual{position:relative;aspect-ratio:1.1/1;display:flex;align-items:center;justify-content:center}
.cap-cards{display:grid;gap:22px}
.cap{padding:26px 28px;border:1px solid var(--line);border-left:3px solid var(--gold);background:#fff}
.cap h3{font-family:var(--serif);font-weight:400;font-size:22px;color:var(--navy);margin-bottom:10px}
.cap p{color:var(--muted);font-size:15px;line-height:1.7}
@media(max-width:860px){.triangle-wrap{grid-template-columns:1fr}}

/* ---- Company facts --------------------------------------------------- */
.facts{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.fact{background:var(--white);padding:30px 34px}
.fact .k{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.fact .v{font-size:16px;color:var(--navy);line-height:1.5}
@media(max-width:640px){.facts{grid-template-columns:1fr}}

/* ---- Platform / RDOS architecture ----------------------------------- */
.rdos-hero{padding-top:clamp(150px,18vh,210px)}
.rdos-mark{font-family:var(--serif);font-size:clamp(60px,9vw,120px);color:var(--gold);font-weight:400;letter-spacing:.04em;line-height:1}
.arch{display:grid;gap:18px;margin-top:20px}
.layer{
  display:grid;grid-template-columns:130px 1fr;gap:clamp(20px,3vw,44px);align-items:start;
  background:rgba(255,255,255,.03);border:1px solid var(--line-light);
  padding:clamp(24px,3vw,38px);transition:background .35s var(--ease),transform .35s var(--ease);
}
.layer:hover{background:rgba(255,255,255,.06);transform:translateX(6px)}
.layer .ln{font-family:var(--serif);color:var(--gold);font-size:13px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}
.layer .ln b{display:block;font-family:var(--serif);font-size:clamp(34px,4vw,52px);font-weight:400;color:#fff;letter-spacing:0;margin-top:6px}
.layer h3{font-family:var(--serif);font-weight:400;font-size:clamp(22px,2.4vw,30px);color:#fff;margin-bottom:18px}
.layer ul{list-style:none;display:grid;gap:12px}
.layer li{color:var(--muted-light);font-size:15px;line-height:1.6;padding-left:22px;position:relative}
.layer li::before{content:"";position:absolute;left:0;top:.6em;width:8px;height:1px;background:var(--gold)}
@media(max-width:640px){.layer{grid-template-columns:1fr;gap:16px}}

/* ---- Contact --------------------------------------------------------- */
.contact-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:clamp(40px,6vw,90px)}
@media(max-width:880px){.contact-grid{grid-template-columns:1fr;gap:50px}}
input[type=hidden]{display:none !important}
.field{margin-bottom:26px}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.field input,.field select,.field textarea{
  width:100%;font-family:var(--sans);font-size:16px;color:var(--navy);
  padding:14px 0;border:none;border-bottom:1px solid var(--line);background:transparent;transition:border-color .3s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-bottom-color:var(--gold)}
.field textarea{resize:vertical;min-height:120px}
.aside-block{padding:34px;background:#fff;border:1px solid var(--line);margin-bottom:24px}
.aside-block h3{font-family:var(--serif);font-weight:400;font-size:26px;color:var(--navy);margin-bottom:14px}
.aside-block p{color:var(--muted);font-size:15.5px;line-height:1.7;margin-bottom:20px}
.contact-meta{display:grid;gap:26px;margin-top:8px}
.cm .k{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.cm .v{color:var(--navy);font-size:16px;line-height:1.55}
.form-note{font-size:13px;color:var(--muted);margin-top:8px}
.form-status{margin-top:18px;font-size:14px;display:none}
.form-status.show{display:block}
.form-status.ok{color:#2c7a4b}
.form-status.err{color:#b03a3a}

/* ---- Footer ---------------------------------------------------------- */
.site-footer{background:var(--navy);color:#fff;padding:clamp(64px,8vw,96px) 0 40px}
.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.1fr;gap:40px;padding-bottom:56px;border-bottom:1px solid var(--line-light)}
.footer-brand .brand{margin-bottom:20px}
.footer-brand p{color:var(--muted-light);font-size:15px;max-width:30ch}
.fcol h4{font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
.fcol ul{list-style:none;display:grid;gap:13px}
.fcol a,.fcol li{color:var(--muted-light);font-size:14.5px;transition:color .25s}
.fcol a:hover{color:#fff}
.fcol .addr{line-height:1.6}
.footer-legal{padding-top:34px;display:flex;flex-direction:column;gap:18px}
.footer-legal .disc{color:rgba(255,255,255,.42);font-size:12.5px;line-height:1.7}
.footer-bottom{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;color:rgba(255,255,255,.5);font-size:12.5px;letter-spacing:.04em;padding-top:8px}
@media(max-width:900px){.footer-top{grid-template-columns:1fr 1fr}.footer-brand{grid-column:1/-1}}
@media(max-width:520px){.footer-top{grid-template-columns:1fr}}

/* ---- Reveal animation ------------------------------------------------ */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.scroll-cue::after{animation:none}}

/* ---- Page hero (interior) ------------------------------------------- */
.page-hero{background:var(--navy);color:#fff;padding:clamp(150px,20vh,240px) 0 clamp(60px,8vw,110px)}
.page-hero h1{margin-top:18px}
.page-hero .lead{color:var(--muted-light);margin-top:26px}

/* ---- Responsive nav -------------------------------------------------- */
@media(max-width:980px){
  .nav-links{display:none}
  .nav .lang{display:none}
  .burger{display:block}
  .grid-3,.stages{grid-template-columns:1fr}
  .pillars{grid-template-columns:1fr;gap:1px}
  .triangle-wrap{grid-template-columns:1fr}
}
@media(max-width:680px){
  .grid-2,.facts{grid-template-columns:1fr}

<style>
.nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--navy);color:#fff;padding:40px}
.nf .code{font-family:var(--serif);font-size:clamp(80px,16vw,180px);font-weight:300;color:var(--gold);line-height:1}
.nf h1{font-family:var(--serif);font-weight:300;font-size:clamp(26px,4vw,40px);margin:10px 0 26px}
.nf p{color:var(--muted-light);margin-bottom:34px}
</style>
</head>
<body>
<div class="nf">
  <div class="code">404</div>
  <h1><span data-lang="en">Page Not Found</span><span data-lang="zh-Hant">頁面不存在</span><span data-lang="zh-Hans">页面不存在</span></h1>
  <p><span data-lang="en">The page you are looking for could not be found.</span><span data-lang="zh-Hant">您所尋找的頁面不存在或已移動。</span><span data-lang="zh-Hans">您所寻找的页面不存在或已移动。</span></p>
  <a class="btn btn--solid" href="/"><span data-lang="en">Return Home</span><span data-lang="zh-Hant">返回首頁</span><span data-lang="zh-Hans">返回首页</span></a>
</div>
<script>
/* Raising Development — site behaviour (trilingual, nav, reveal, form) */
(function () {
  "use strict";
  var LOCALES = ["en", "zh-Hant", "zh-Hans"];
  var LANG_HTML = { "en": "en", "zh-Hant": "zh-Hant", "zh-Hans": "zh-Hans" };
  var STORE_KEY = "rd-locale";

  function getStored() { try { return localStorage.getItem(STORE_KEY); } catch (e) { return null; } }
  function store(loc) { try { localStorage.setItem(STORE_KEY, loc); } catch (e) {} }
  function detectDefault() {
    var stored = getStored();
    if (stored && LOCALES.indexOf(stored) > -1) return stored;
    var n = (navigator.language || "en").toLowerCase();
    if (n.indexOf("zh") === 0) {
      if (n.indexOf("hant") > -1 || n.indexOf("tw") > -1 || n.indexOf("hk") > -1 || n.indexOf("mo") > -1) return "zh-Hant";
      return "zh-Hans";
    }
    return "en";
  }
  function applyLocale(loc) {
    if (LOCALES.indexOf(loc) < 0) loc = "en";
    document.documentElement.setAttribute("data-locale", loc);
    document.documentElement.setAttribute("lang", LANG_HTML[loc]);
    store(loc);
    document.querySelectorAll(".lang button[data-set-locale]").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-set-locale") === loc);
    });
    var wp = (loc === "en") ? "whitepaper-en.pdf" : "whitepaper-cn.pdf";
    document.querySelectorAll("a[data-whitepaper]").forEach(function (a) { a.setAttribute("href", wp); });
  }

  applyLocale(detectDefault());

  function ready(fn) {
    if (document.readyState !== "loading") fn();
    else document.addEventListener("DOMContentLoaded", fn);
  }

  function closeDrawer() {
    var d = document.querySelector(".drawer");
    if (d) d.classList.remove("open");
    document.body.style.overflow = "";
  }

  ready(function () {
    applyLocale(document.documentElement.getAttribute("data-locale") || "en");

    document.querySelectorAll(".lang button[data-set-locale]").forEach(function (b) {
      b.addEventListener("click", function () { applyLocale(b.getAttribute("data-set-locale")); closeDrawer(); });
    });

    var header = document.querySelector(".site-header");
    var onScroll = function () {
      if (!header) return;
      if (window.scrollY > 40) header.classList.add("scrolled");
      else header.classList.remove("scrolled");
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });

    var burger = document.querySelector(".burger");
    var drawer = document.querySelector(".drawer");
    if (burger && drawer) {
      burger.addEventListener("click", function () { drawer.classList.add("open"); document.body.style.overflow = "hidden"; });
      drawer.querySelectorAll("a, .drawer-close").forEach(function (el) { el.addEventListener("click", closeDrawer); });
    }

    var reveals = document.querySelectorAll(".reveal");
    if ("IntersectionObserver" in window && reveals.length) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting) { en.target.classList.add("in"); io.unobserve(en.target); }
        });
      }, { threshold: 0.08, rootMargin: "0px 0px -6% 0px" });
      reveals.forEach(function (r) { io.observe(r); });
    } else {
      reveals.forEach(function (r) { r.classList.add("in"); });
    }

    var form = document.querySelector("form[data-contact]");
    if (form) initForm(form);
  });

  function initForm(form) {
    var status = form.querySelector(".form-status");
    var endpoint = form.getAttribute("data-endpoint") || "";
    form.addEventListener("submit", function (e) {
      if (!endpoint || endpoint.indexOf("YOUR_") === 0) {
        e.preventDefault();
        var fd = new FormData(form);
        var lines = [];
        fd.forEach(function (v, k) { if (v) lines.push(k + ": " + v); });
        var subject = encodeURIComponent("[Website enquiry] " + (fd.get("name") || ""));
        var body = encodeURIComponent(lines.join("\n"));
        window.location.href = "mailto:contact@raisingdevelopment.com?subject=" + subject + "&body=" + body;
        return;
      }
      e.preventDefault();
      var data = new FormData(form);
      setStatus("", "");
      var btn = form.querySelector("[type=submit]");
      if (btn) btn.disabled = true;
      fetch(endpoint, { method: "POST", body: data, headers: { Accept: "application/json" } })
        .then(function (r) { return r.json().catch(function () { return {}; }).then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (res) {
          if (res.ok) { form.reset(); setStatus("ok", form.getAttribute("data-ok") || "Thank you — your message has been sent."); }
          else { setStatus("err", form.getAttribute("data-err") || "Something went wrong. Please email us directly."); }
        })
        .catch(function () { setStatus("err", form.getAttribute("data-err") || "Something went wrong. Please email us directly."); })
        .finally(function () { if (btn) btn.disabled = false; });
    });
    function setStatus(kind, msg) {
      if (!status) return;
      status.className = "form-status" + (kind ? " show " + kind : "");
      status.textContent = msg;
    }
  }
})();

</script>
</body>
</html>
